name: Build and Publish Plugin

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual runs

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: pnpm install

    - name: Build plugin
      run: pnpm run build:plugin

    - name: Get version from package.json
      id: version
      run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

    - name: Rename dist with version
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        mv onlyoffice-antidote.plugin "onlyoffice-antidote-${VERSION}.plugin"
        # Or for a specific file: mv dist.zip "plugin-${VERSION}.zip"

    - name: Upload plugin artifact
      uses: actions/upload-artifact@v4
      with:
        name: plugin-build-${{ steps.version.outputs.version }}
        path: onlyoffice-antidote-${{ steps.version.outputs.version }}.plugin
        retention-days: 30
